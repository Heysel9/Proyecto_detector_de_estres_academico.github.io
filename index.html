<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindBlue - Luxury Login</title>
    <style>
        :root {
            --bg-dark: #050a14;
            --gold: #d4af37;
            --gold-light: #f9e2af;
            --deep-blue: #0a192f;
            --text-gray: #a8b2d1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', serif;
        }

        body {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Contenedor principal con el formato original */
        .login-card {
            background-color: var(--deep-blue);
            width: 900px;
            height: 550px;
            display: flex;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        /* Lado Izquierdo: Formulario */
        .login-left {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
        }

        .tabs {
            display: flex;
            gap: 30px;
            margin-bottom: 40px;
        }

        .tab {
            color: var(--text-gray);
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            cursor: pointer;
            padding-bottom: 5px;
            border-bottom: 2px solid transparent;
            transition: 0.3s;
        }

        .tab.active {
            color: var(--gold);
            border-bottom: 2px solid var(--gold);
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 25px;
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .btn-gold {
            background-color: var(--gold);
            color: var(--bg-dark);
            padding: 12px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-gold:hover {
            background-color: var(--gold-light);
            transform: translateY(-2px);
        }

        /* Lado Derecho: Decoración Isométrica */
        .login-right {
            flex: 1;
            background: radial-gradient(circle at center, #112240 0%, #050a14 100%);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Círculos decorativos oscuros */
        .circle-bg {
            position: absolute;
            width: 150%;
            height: 150%;
            background-color: var(--deep-blue);
            border-radius: 50%;
            left: -20%;
            z-index: 0;
            opacity: 0.5;
        }

        .illustration {
            z-index: 1;
            width: 80%;
        }

        .logo {
            position: absolute;
            top: 30px;
            left: 40px;
            color: var(--gold);
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">EQUILIBRIO ACADÉMICO</div>
        
        <div class="login-left">
            <div class="tabs">
                <span class="tab active">Login</span>
                <span class="tab" onclick="alert('Pestaña de registro activada')">Registrarse</span>
            </div>
            
            <div class="input-group">
                <input type="email" placeholder="Email o usuario">
            </div>
            <div class="input-group">
                <input type="password" placeholder="Contraseña">
            </div>
            
            <button class="btn-gold">ENTRAR</button>
            <p style="color: var(--text-gray); font-size: 0.8rem; margin-top: 20px; text-align: center;">
                ¿Olvidaste tu contraseña?
            </p>
        </div>

        <div class="login-right">
            <div class="circle-bg"></div>
            <div class="illustration">
                <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                    <rect x="40" y="60" width="120" height="80" rx="5" fill="#d4af37" />
                    <rect x="45" y="65" width="110" height="70" rx="2" fill="#0a192f" />
                    <rect x="30" y="140" width="140" height="10" rx="5" fill="#b8860b" />
                </svg>
            </div>
        </div>
    </div>

</body>
</html>
